  <polygon points="148,62 192,88 192,140 148,166 104,140 104,88" fill="none" stroke="#0fba8a" stroke-width="3" stroke-linejoin="round" style="fill:none;stroke:rgb(15, 186, 138);color:rgb(0, 0, 0);stroke-width:3px;stroke-linecap:butt;stroke-linejoin:round;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <!-- Inner hex -->
