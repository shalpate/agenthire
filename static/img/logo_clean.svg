<svg width="100%" viewBox="0 0 580 180" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="AgentHire">
  <defs>
    <!-- Body: matte-black radial with faint centre gloss, like the reference -->
    <radialGradient id="ahBody" cx="48%" cy="30%" r="72%">
      <stop offset="0%"  stop-color="#303030"/>
      <stop offset="45%" stop-color="#141414"/>
      <stop offset="100%" stop-color="#000000"/>
    </radialGradient>
    <radialGradient id="ahHead" cx="50%" cy="30%" r="68%">
      <stop offset="0%"  stop-color="#3A3A3A"/>
      <stop offset="55%" stop-color="#141414"/>
      <stop offset="100%" stop-color="#000000"/>
    </radialGradient>
    <!-- Eye: hot red core fading to deep crimson -->
    <radialGradient id="ahEye" cx="50%" cy="50%" r="60%">
      <stop offset="0%"  stop-color="#ffa0a0"/>
      <stop offset="40%" stop-color="#e23434"/>
      <stop offset="100%" stop-color="#8a1212"/>
    </radialGradient>
    <filter id="ahEyeGlow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="1.6" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- MASCOT - tall proportions, two distinct shapes visually separated by a
       shoulder shadow, matching the reference silhouette. -->
  <g transform="translate(6, 4)">
    <!-- BODY: wide bell at top (shoulders flare out from under the head)
         tapering to a sharp point at the bottom -->
    <path d="M 10 82
             C 4 108 10 142 63 170
             C 116 142 122 108 116 82
             C 102 72 84 68 63 68
             C 42 68 24 72 10 82 Z"
          fill="url(#ahBody)"/>

    <!-- HEAD: tall dome, slightly taller than wide -->
    <ellipse cx="63" cy="42" rx="40" ry="40" fill="url(#ahHead)"/>

    <!-- Shoulder shadow - darker curve where head meets body (the "hood bunch") -->
    <path d="M 22 80
             C 38 74 52 70 63 70
             C 74 70 88 74 104 80
             C 98 86 82 90 63 90
             C 44 90 28 86 22 80 Z"
          fill="#000000" opacity="0.7"/>

    <!-- Forehead sheen -->
    <ellipse cx="63" cy="22" rx="22" ry="9" fill="#ffffff" opacity="0.08"/>

    <!-- Chest sheen (subtle glow in the middle of the body) -->
    <ellipse cx="63" cy="118" rx="16" ry="26" fill="#ffffff" opacity="0.05"/>

    <!-- EYES: red glow -->
    <g filter="url(#ahEyeGlow)">
      <circle cx="46" cy="44" r="7" fill="url(#ahEye)"/>
      <circle cx="80" cy="44" r="7" fill="url(#ahEye)"/>
    </g>
    <circle cx="46" cy="42" r="1.8" fill="#ffd4d4"/>
    <circle cx="80" cy="42" r="1.8" fill="#ffd4d4"/>
  </g>

  <!-- WORDMARK - AGENT / HIRE split so each can be coloured independently -->
  <text x="160" y="118"
        font-family="'DM Sans','Helvetica Neue',Arial,sans-serif"
        font-size="60" font-weight="700"
        letter-spacing="3">
    <tspan class="logo-agent">AGENT</tspan><tspan class="logo-hire" fill="#CE2E2E">HIRE</tspan>
  </text>
</svg>
