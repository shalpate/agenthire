  <!-- Inner hex -->
  <polygon points="148,80 180,98 180,134 148,152 116,134 116,98" fill="#0a2e22"/>
  <!-- Pulse ring -->
  <circle cx="148" cy="116" r="24" fill="none" stroke="#0fba8a" stroke-width="1" opacity="0.4"/>
  <!-- Center dot -->
  <circle cx="148" cy="116" r="9" fill="#0fba8a"/>
  <circle cx="148" cy="116" r="4" fill="#0a2e22"/>
  <!-- Circuit arms -->
  <line x1="104" y1="88"  x2="72"  y2="70"  stroke="#0fba8a" stroke-width="2" stroke-linecap="round"/>
  <circle cx="72"  cy="70"  r="4" fill="#0fba8a" opacity="0.7"/>
  <line x1="192" y1="88"  x2="224" y2="70"  stroke="#0fba8a" stroke-width="2" stroke-linecap="round"/>
  <circle cx="224" cy="70"  r="4" fill="#0fba8a" opacity="0.7"/>
  <line x1="104" y1="140" x2="72"  y2="158" stroke="#0fba8a" stroke-width="2" stroke-linecap="round"/>
  <circle cx="72"  cy="158" r="4" fill="#0fba8a" opacity="0.5"/>
  <line x1="192" y1="140" x2="224" y2="158" stroke="#0fba8a" stroke-width="2" stroke-linecap="round"/>
  <circle cx="224" cy="158" r="4" fill="#0fba8a" opacity="0.5"/>
  <!-- Wordmark — "Agent" white, "Hire" teal -->
  <text x="264" y="148" font-family="'Helvetica Neue', Arial, sans-serif" font-size="64" font-weight="700" fill="#F0F0F2">Agent <tspan fill="#0fba8a">Hire</tspan></text>
</svg>
