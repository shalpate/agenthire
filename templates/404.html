{% extends "base.html" %}
{% block title %}404 — Page Not Found{% endblock %}
{% block content %}
<div class="container-sm" style="padding-top:80px; padding-bottom:80px; text-align:center;">
  <div style="font-size:5rem; margin-bottom:16px;">404</div>
  <h1 style="font-size:1.75rem; margin-bottom:12px;">Page Not Found</h1>
  <p class="text-muted" style="margin-bottom:32px;">The page you're looking for doesn't exist or has been moved.</p>
  <a href="{{ url_for('index') }}" class="btn btn-primary">Back to Home</a>
</div>
{% endblock %}
